<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FISH PRAWN CRAB - ROYAL 3-DICE CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (ব্যালেন্স বক্স সহ ১ শতভাগ ডাইস-৩ডি স্ট্যান্ডার্ডে নিখুঁত লক ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">FISH PRAWN CRAB</div>
            <div class="game">ROYAL 3-DICE SHOWDOWN</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 লাইভ ৩-ডাইস রোলীং কাপ জোন এরিয়া ভাই ভাই -->
    <div class="dice-roll-zone">
        <div class="dice-window-frame" id="dice-container-grid">
            <!-- ৩টি ক্যাসিনো ঐতিহ্যবাহী ডাইস ঘর এখানে ওয়ান-শটে নিখুঁত জেনারেট হবে ভাই ভাই -->
            <div class="fpc-dice default-dice-bg">🎲</div>
            <div class="fpc-dice default-dice-bg">🎲</div>
            <div class="fpc-dice default-dice-bg">🎲</div>
        </div>
    </div>

    <!-- 🎯 বাজি ধরার প্রধান ৬টি প্রফেশনাল নিয়ন বেটিং বোর্ড ঘর (ঐতিহ্যবাহী কিলার ওডস কড়া লক ভাই ভাই) -->
    <div class="betting-board-fpc">
        <button class="fpc-board-btn" id="board-FISH" onclick="selectFpcSide('FISH')">
            <span class="fpc-icon">🐟</span>
            <span class="fpc-label">FISH</span>
        </button>
        <button class="fpc-board-btn" id="board-PRAWN" onclick="selectFpcSide('PRAWN')">
            <span class="fpc-icon">🦐</span>
            <span class="fpc-label">PRAWN</span>
        </button>
        <button class="fpc-board-btn" id="board-CRAB" onclick="selectFpcSide('CRAB')">
            <span class="fpc-icon">🦀</span>
            <span class="fpc-label">CRAB</span>
        </button>
        <button class="fpc-board-btn" id="board-ROOSTER" onclick="selectFpcSide('ROOSTER')">
            <span class="fpc-icon">🐓</span>
            <span class="fpc-label">ROOSTER</span>
        </button>
        <button class="fpc-board-btn" id="board-CALABASH" onclick="selectFpcSide('CALABASH')">
            <span class="fpc-icon">🏺</span>
            <span class="fpc-label">GOURD</span>
        </button>
        <button class="fpc-board-btn" id="board-COIN" onclick="selectFpcSide('COIN')">
            <span class="fpc-icon">🪙</span>
            <span class="fpc-label">COIN</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং ও উইন-লস মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">যেকোনো ১টি প্রতীক সিলেক্ট করে SHAKE বোতাম চাপুন ভাই ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০0 প্লাস-মাইনাস ও SHAKE বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleFpcShakeAction()">SHAKE</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedSide = null; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // ৬টি প্রতীকের জন্য ওরিজিনাল ইমোজি ম্যাপিং চাবি ভাই ভাই
        const symbolDisplayMap = {
            "FISH": "🐟", "PRAWN": "🦐", "CRAB": "🦀", "ROOSTER": "🐓", "CALABASH": "🏺", "COIN": "🪙"
        };

        // 🧠 [১ শতভাগ একুরেট ৩-ডাইস শেকিং এনিমেশন ইঞ্জিন ভাই ভাই]
        function animateFpcDiceRolling(serverData) {
            const container = document.getElementById("dice-container-grid");
            const finalDiceArray = serverData.diceResults || [];

            let shakeCount = 0;
            // ⏱️ ১০০ মিলি-সেকেন্ড পর পর হাই-স্পিড ডাইস কাঁপানো মোশন এনিমেশন ভাই ভাই
            const shakeTimeline = setInterval(() => {
                container.innerHTML = "";
                for (let i = 0; i < 3; i++) {
                    const randomSym = Object.keys(symbolDisplayMap)[Math.floor(Math.random() * 6)];
                    const diceDiv = document.createElement("div");
                    diceDiv.className = "fpc-dice dice-blur-shake-node";
                    diceDiv.innerHTML = `<span class="dice-emoji-inner">${symbolDisplayMap[randomSym]}</span>`;
                    container.appendChild(diceDiv);
                }
                shakeCount++;

                if (shakeCount >= 12) {
                    clearInterval(shakeTimeline);
                    // ফাইনাল কড়া ১ শতভাগ একুরেট সার্ভার রেজাল্ট পুশ ভাই ভাই
                    container.innerHTML = "";
                    finalDiceArray.forEach((sym) => {
                        const diceDiv = document.createElement("div");
                        diceDiv.className = "fpc-dice final-dice-pop-node";
                        
                        // যদি এই ডাইসটি প্লেয়ারের বাজি ধরা প্রতীকের সাথে মিলে যায় তবে ওটার চারপাশ গোল্ডেন গলো করবে!
                        if (sym === selectedSide) {
                            diceDiv.className = "fpc-dice final-dice-pop-node dice-win-match-glow";
                        }
                        
                        // 🚀 [মেগা ইমেজ ফলব্যাক]: ছবি না থাকলে বড় করে ট্র্যাডিশনাল ইমোজি রেন্ডার করবে ভাই ভাই!
                        const imgPath = `./images/${sym.toLowerCase()}.png`;
                        diceDiv.innerHTML = `<img src="${imgPath}" class="dice-img-asset" onerror="this.onerror=null; this.parentNode.innerHTML='<span class=\"dice-emoji-inner\">${symbolDisplayMap[sym]}</span>';">`;
                        container.appendChild(diceDiv);
                    });

                    showFinalGameReward(serverData.status, serverData.winAmount, serverData.matchCount, serverData.result);
                }
            }, 100);
        }

        // 🛫 কোর SHAKE বোতাম ট্রিগার অ্যাকশন গেটওয়ে ভাই ভাই
        async function handleFpcShakeAction() {
            if (isSpinning) return;
            if (!selectedSide) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি প্রতীক (FISH, PRAWN, CRAB ইত্যাদি) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 ডাইস কাপ কড়া ঝাঁকুনি দেওয়া হচ্ছে...";

            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/fpc-roll`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedSide
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    animateFpcDiceRolling(data);
                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopFpcState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার SHAKE বোতাম চাপুন ভাই ভাই।");
                stopFpcState();
            }
        }

                function showFinalGameReward(status, winAmount, matchCount, winnerSide) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! আপনার প্রতীক মিলেছে ${matchCount}টি ডাইসে [৳${winAmount}]`;
            } else {
                playAudio('wheel'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ এই রাউন্ডে আপনার সিলেক্ট করা প্রতীক ১টি ডাইসেও মেলেনি ভাই ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopFpcState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleFpcShakeAction();
                }, 3000); 
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/fpc-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance fetch error pass"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function selectFpcSide(side) {
            if (isSpinning) return;
            selectedSide = side;
            document.querySelectorAll(".fpc-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            document.getElementById(`board-${side}`).classList.add("active-side-bet");
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.wheel.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleFpcShakeAction();
            playAudio('click');
        }

        function stopFpcState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
